<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccién Clases</title>
    <link rel="stylesheet" href="formulario2.css">

</head>

<body>
    <div class="contenedor">
        <h2>Inscripción de clase</h2>
        <form action="https://formsubmit.co/pancispes@gmal.com" method="post">
            <div class="grupo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre", required>
            </div>

            <div class="grupo">
                <label for="apellido">Apellidos:</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingrese apellidos", required>
            </div>

            <div class="grupo">
                <label for="orario"> Orario:</label>
                <select id="orario" name="orario" multiple required size="3">
                    <option value="mañana">Mañana</option>
                    <option value="tarde">Tarde</option>
                    <option value="noche">Noche</option>
                </select>
            </div>

            <div class="grupo">
                <label for="curso"> Seleccionar Curso: (Usa Ctrl/Cmd para varios):</label>
                <select id="curso" name="curso" multiple required size="10">
                    <option value="java">Java</option>
                    <option value="python">Python</option>
                    <option value="html5">Html5</option>
                    <option value="javascrip">Javasrip</option>
                    <option value="oracle">Oracle</option>
                    <option value="base de datos">Base de datos</option>
                    <option value="poo">POO</option>
                    <option value="SQL">SQL</option>
                    <option value="c++">C++</option>
                    <option value="rust">Rust</option>
                </select>
            </div>
            <label for="observaciones">Observaciones:</label>
            <textarea id="observaciones" name="observaciones" placeholder="Ingrese observaciones sobre su inscripción" rows="10"></textarea>
            <button type="submit">Enviar</button>

        </form>


    </div>



    
</body>
</html>
